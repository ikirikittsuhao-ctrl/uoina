<style>
/* CSS変数とOSシステムカラーの連動設定 */
:root {
    --bg-color: #ffffff;
    --text-color: #0f1419;
    --sub-text-color: #536471;
    --border-color: #eff3f4;
    --hover-bg: rgba(15, 20, 25, 0.1);
    --accent-color: #1d9bf0;
    --modal-bg: #ffffff;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg-color: #000000;
        --text-color: #e7e9ea;
        --sub-text-color: #71767b;
        --border-color: #2f3336;
        --hover-bg: rgba(239, 243, 244, 0.1);
        --accent-color: #1d9bf0;
        --modal-bg: #16181c;
    }
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
}

.x-sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 88px;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 12px;
    box-sizing: border-box;
    z-index: 1000;
    background-color: var(--bg-color);
}

@media (min-width: 1280px) {
    .x-sidebar {
        width: 275px;
        align-items: flex-start;
    }
}

.sidebar-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
}

.sidebar-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    color: var(--text-color);
    margin: 2px 0 4px 0;
}
.sidebar-logo:hover {
    background-color: var(--hover-bg);
}
.x-icon {
    width: 30px;
    height: 30px;
    fill: currentColor;
}

.nav-links {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
}

.btn-reset {
    background: none;
    border: none;
    font: inherit;
    cursor: pointer;
    text-align: left;
}

.nav-item {
    display: flex;
    align-items: center;
    padding: 12px;
    border-radius: 9999px;
    color: var(--text-color);
    text-decoration: none;
    transition: background-color 0.2s;
    width: fit-content;
}
.nav-item:hover {
    background-color: var(--hover-bg);
}

.nav-icon {
    width: 26px;
    height: 26px;
    fill: currentColor;
}

.nav-label {
    display: none;
    font-size: 20px;
    margin-left: 20px;
    margin-right: 16px;
}

@media (min-width: 1280px) {
    .nav-label {
        display: inline;
    }
}

.post-btn-sidebar {
    margin-top: 16px;
    background-color: var(--accent-color);
    color: #ffffff;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-weight: bold;
    height: 52px;
    width: 52px;
    transition: opacity 0.2s;
}
.post-btn-sidebar:hover {
    opacity: 0.9;
}

.post-icon-mobile {
    width: 24px;
    height: 24px;
    fill: currentColor;
}

.post-label-desktop {
    display: none;
    font-size: 17px;
}

@media (min-width: 1280px) {
    .post-btn-sidebar {
        width: 100%;
    }
    .post-icon-mobile {
        display: none;
    }
    .post-label-desktop {
        display: inline;
    }
}

/* モーダルスタイル */
.modal-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
}
.modal-backdrop.hidden {
    display: none;
}

.modal-content {
    background-color: var(--modal-bg);
    border-radius: 16px;
    width: 90%;
    max-width: 320px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-color);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
}
.modal-header h3 {
    margin: 0;
    font-size: 18px;
}

.close-btn {
    background: none;
    border: none;
    font-size: 24px;
    color: var(--text-color);
    cursor: pointer;
}

.modal-body {
    padding: 12px 0;
}

.logout-menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: #f4212e;
    text-decoration: none;
    font-weight: bold;
    font-size: 15px;
}
.logout-menu-item:hover {
    background-color: var(--hover-bg);
}
.menu-icon {
    width: 20px;
    height: 20px;
    fill: currentColor;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const openBtn = document.getElementById('open-settings-btn');
    const closeBtn = document.getElementById('close-settings-btn');
    const modal = document.getElementById('settings-modal');

    if (openBtn && closeBtn && modal) {
        openBtn.addEventListener('click', () => modal.classList.remove('hidden'));
        closeBtn.addEventListener('click', () => modal.classList.add('hidden'));
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.add('hidden');
        });
    }
});
</script>
